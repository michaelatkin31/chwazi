<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chwazi" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <title>Chwazi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    #mode-bar {
      position: fixed;
      top: env(safe-area-inset-top, 12px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      pointer-events: auto;
    }
    #mode-bar button {
      appearance: none;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
    }
    #mode-bar button.active {
      background: rgba(255,255,255,0.92);
      color: #0a0a0a;
    }
    #hint {
      position: fixed;
      left: 0; right: 0;
      bottom: calc(env(safe-area-inset-bottom, 18px) + 18px);
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #hint.hidden { opacity: 0; }

    /* Invisible tap-target in the far top-right. 4 quick taps reveal the
       cheater control panel. Sits above the canvas so taps don't add a
       finger to the picker. */
    #cheat-zone {
      position: fixed;
      top: 0;
      right: 0;
      width: 80px;
      height: 80px;
      z-index: 20;
      touch-action: manipulation;
    }

    #cheat-panel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.18s ease;
    }
    #cheat-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .cheat-card {
      width: 340px;
      max-width: 100%;
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 22px 20px 18px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .cheat-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .cheat-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: -6px;
      margin-bottom: 6px;
    }
    .cheat-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cheat-options button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      touch-action: manipulation;
    }
    .cheat-options button.active {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.32);
    }
    .cheat-close {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
      padding: 11px;
      border-radius: 10px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="mode-bar">
    <button data-mode="one" class="active">One</button>
    <button data-mode="order">Order</button>
    <button data-mode="teams">Teams</button>
  </div>
  <div id="hint">Place 2+ fingers to begin</div>
  <div id="cheat-zone" aria-hidden="true"></div>
  <div id="cheat-panel" class="hidden" aria-hidden="true">
    <div class="cheat-card" role="dialog" aria-label="Cheater control panel">
      <div class="cheat-title">Cheater control panel</div>
      <div class="cheat-subtitle">Applies to One mode. Saved on this device.</div>
      <div class="cheat-options">
        <button data-cheat="random">Random (fair)</button>
        <button data-cheat="first">First finger down wins</button>
        <button data-cheat="last">Last finger down wins</button>
        <button data-cheat="top">Topmost finger wins</button>
        <button data-cheat="bottom">Bottommost finger wins</button>
      </div>
      <button class="cheat-close">Close</button>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
