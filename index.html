<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chwazi" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <title>Chwazi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    #mode-bar {
      position: fixed;
      top: env(safe-area-inset-top, 12px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      pointer-events: auto;
    }
    #mode-bar button {
      appearance: none;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.65);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      touch-action: manipulation;
    }
    #mode-bar button.active {
      background: rgba(255,255,255,0.92);
      color: #0a0a0a;
    }
    #hint {
      position: fixed;
      left: 0; right: 0;
      bottom: calc(env(safe-area-inset-bottom, 18px) + 18px);
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="mode-bar">
    <button data-mode="one" class="active">One</button>
    <button data-mode="order">Order</button>
    <button data-mode="teams">Teams</button>
  </div>
  <div id="hint">Place 2+ fingers to begin</div>
  <script src="app.js"></script>
</body>
</html>
